/* ══════════════════════════════════════════
   UTILITAIRES DATE
   ──────────────────────────────────────────
   Le .gs envoie la date en "dd/MM/yyyy" (ex: "14/06/2025").
   toDisplay() → garantit l'affichage JJ/MM/AAAA quel que soit le format reçu.
   toISO()     → convertit vers YYYY-MM-DD pour le tri et les <input type="date">.
   jourSemaine() → retourne le nom du jour en français à partir de dd/MM/yyyy.
   ══════════════════════════════════════════ */
function toDisplay(val) {
  if (!val) return '';
  const s = String(val).trim();
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;               // déjà JJ/MM/AAAA ✓
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {                         // YYYY-MM-DD → JJ/MM/AAAA
    const [y, m, d] = s.split('-');
    return d + '/' + m + '/' + y;
  }
  return s;
}

function toISO(val) {
  if (!val) return '';
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;                 // déjà ISO ✓
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {                       // JJ/MM/AAAA → YYYY-MM-DD
    const [d, m, y] = s.split('/');
    return y + '-' + m + '-' + d;
  }
  return s;
}

/* Retourne le nom du jour de la semaine (ex: "lundi") depuis dd/MM/yyyy */
function jourSemaine(val) {
  if (!val) return '';
  const s = String(val).trim();
  let d;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    const [jj, mm, yyyy] = s.split('/');
    d = new Date(parseInt(yyyy), parseInt(mm) - 1, parseInt(jj));
  } else if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [yyyy, mm, jj] = s.split('-');
    d = new Date(parseInt(yyyy), parseInt(mm) - 1, parseInt(jj));
  } else {
    return '';
  }
  return d.toLocaleDateString('fr-FR', { weekday: 'long' });
}

function niveauIBP(v) {
  const n = parseFloat(v);
  if (isNaN(n) || v === '') return null;
  if (n <= 25)  return { label: '🟢 N1 — Facile',          bg: '#d4edda', color: '#155724' };
  if (n <= 50)  return { label: '🔵 N2 — Assez Facile',    bg: '#cce5ff', color: '#004085' };
  if (n <= 75)  return { label: '🟡 N3 — Peu Difficile',   bg: '#fff3cd', color: '#856404' };
  if (n <= 100) return { label: '🔴 N4 — Assez Difficile', bg: '#f8d7da', color: '#721c24' };
  return              { label: '⚫ N5 — Difficile',         bg: '#343a40', color: '#ffffff' };
}

/* ══════════════════════════════════════════
   AUTOCOMPLÉTION
   ══════════════════════════════════════════ */
function initAutocomplete() {
  setupAutocomplete('animateur-input', 'animateur-list', () => animateurs.map(a => a.nom));
  setupAutocomplete('nom-input',       'nom-list',       () => randos);
}

function setupAutocomplete(inputId, listId, getItems) {
  const input = document.getElementById(inputId);
  const list  = document.getElementById(listId);
  let hi = -1;

  input.addEventListener('input', () => {
    const f = input.value.toLowerCase().trim();
    list.innerHTML = ''; hi = -1;
    if (!f) { list.classList.remove('open'); return; }
    const matches = getItems().filter(i => i.toLowerCase().includes(f)).slice(0, 10);
    if (!matches.length) { list.classList.remove('open'); return; }
    matches.forEach(item => {
      const div = document.createElement('div');
      div.className = 'autocomplete-item';
      div.textContent = item;
      div.addEventListener('mousedown', () => { input.value = item; list.classList.remove('open'); });
      list.appendChild(div);
    });
    list.classList.add('open');
  });

  input.addEventListener('keydown', e => {
    const items = list.querySelectorAll('.autocomplete-item');
    if (!items.length) return;
    if      (e.key === 'ArrowDown')         { e.preventDefault(); hi = Math.min(hi + 1, items.length - 1); }
    else if (e.key === 'ArrowUp')           { e.preventDefault(); hi = Math.max(hi - 1, 0); }
    else if (e.key === 'Enter' && hi >= 0) { e.preventDefault(); input.value = items[hi].textContent; list.classList.remove('open'); hi = -1; return; }
    items.forEach((el, i) => el.classList.toggle('highlighted', i === hi));
  });

  input.addEventListener('blur', () => setTimeout(() => list.classList.remove('open'), 150));
}

/* ══════════════════════════════════════════
   ONGLETS

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'gestion') loadEvents();
}

/* ══════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════ */
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => t.className = '', 3500);
}

function setBusy(btnId, busy) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (busy) { btn.dataset.label = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> En cours…'; }
  else        btn.innerHTML = btn.dataset.label;
  btn.disabled = busy;
}

/* ══════════════════════════════════════════
   CRÉER
   ══════════════════════════════════════════ */
async function creerRando() {
  const date      = document.getElementById('date').value;
  const nom       = document.getElementById('nom-input').value.trim();
  const animateur = document.getElementById('animateur-input').value.trim();
  const ibp       = document.getElementById('ibp').value.trim();
  const distance  = document.getElementById('distance').value.trim();
  const denivele  = document.getElementById('denivele').value.trim();
  if (!date || !nom || !animateur) { showToast('Veuillez remplir les champs obligatoires (*)', true); return; }
  setBusy('btn-create', true);
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fiches`, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer':        'return=minimal'
      },
      body: JSON.stringify({
        date_rando: date,
        nom_rando:  nom,
        animateur:  animateur,
        ibp:        ibp       ? parseFloat(ibp)       : null,
        distance:   distance  ? parseFloat(distance)  : null,
        denivele:   denivele  ? parseInt(denivele)     : null,
        statut:     'publiée'
      })
    });
    if (res.ok) {
      showToast('✅ Randonnée créée dans Supabase et Calendar !');
      ['ibp','distance','denivele'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('nom-input').value = '';
      document.getElementById('animateur-input').value = '';
      document.getElementById('ibp-badge').className = 'ibp-badge';
      const last = new Date(date + 'T12:00:00');
      const dow  = last.getDay();
      const next = new Date(last);
      next.setDate(last.getDate() + (dow === 1 ? 3 : dow === 4 ? 4 : 3));
      document.getElementById('date').value = next.toISOString().split('T')[0];
    } else {
      const txt = await res.text();
      showToast('Erreur : ' + txt, true);
    }
  } catch(e) { showToast('Erreur réseau : ' + e.message, true); }
  setBusy('btn-create', false);
}

   ══════════════════════════════════════════ */
async function loadEvents() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fiches?select=*&order=date_rando.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    allRows = await res.json();
    renderTable();
  } catch(e) { showToast('Erreur réseau lors du chargement.', true); }
}

/* ══════════════════════════════════════════
   RENDU DU TABLEAU (avec tri)
   ══════════════════════════════════════════ */
function renderTable() {
  const tbody = document.getElementById('events-body');
  tbody.innerHTML = '';

  if (!allRows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Aucun événement trouvé.</td></tr>';
    updateSortIcons();
    return;
  }

  const sorted = [...allRows].sort((a, b) => {
    let va, vb;
    if (sortCol === 'date') {
      va = a.date_rando || '';
      vb = b.date_rando || '';
    } else {
      va = (a.animateur || '').toLowerCase();
      vb = (b.animateur || '').toLowerCase();
    }
    if (va < vb) return sortDir === 'asc' ? -1 :  1;
    if (va > vb) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });

  sorted.forEach(ev => {
    const tr      = document.createElement('tr');
    const ej      = JSON.stringify(ev).replace(/'/g, "&#39;");
    const dateAff = toDisplay(ev.date_rando);
    const jour    = jourSemaine(ev.date_rando);
    const statut  = ev.statut || 'publiée';
    const annulee = statut === 'annulée';

    const dateHtml = jour
      ? `<span class="date-cell"><span class="jour">${jour}</span><span class="date">${dateAff}</span></span>`
      : `<span class="date-cell"><span class="date">${dateAff || '—'}</span></span>`;

    tr.style.opacity = annulee ? '0.5' : '1';
    tr.innerHTML = `
      <td>${dateHtml}</td>
      <td><strong style="${annulee ? 'text-decoration:line-through' : ''}">${ev.nom_rando || '—'}</strong>${annulee ? ' <span style="color:#e53e3e;font-size:.75rem">❌ Annulée</span>' : ''}</td>
      <td>${ev.animateur || '—'}</td>
      <td>${ev.ibp      ? '<span class="badge">'      + ev.ibp      + '</span>'     : '—'}</td>
      <td>${ev.distance ? '<span class="badge green">' + ev.distance + ' km</span>' : '—'}</td>
      <td>${ev.denivele ? '<span class="badge green">' + ev.denivele + ' m</span>'  : '—'}</td>
      <td class="actions-cell">
        <button class="btn btn-edit"   onclick='openEdit(${ej})'>✏️ Modifier</button>
        ${!annulee ? `<button class="btn btn-delete" onclick='confirmDelete(${ev.id},"${(ev.nom_rando||'').replace(/"/g,'&quot;')}","${(ev.animateur||'').replace(/"/g,'&quot;')}",${JSON.stringify(ev.date_rando)})'>❌ Annuler</button>` : ''}
      </td>`;
    tbody.appendChild(tr);
  });

  updateSortIcons();
}

/* Mise à jour visuelle des flèches dans les en-têtes */
function updateSortIcons() {
  document.querySelectorAll('thead th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    const icon = th.querySelector('.sort-icon');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      icon.textContent = sortDir === 'asc' ? '↑' : '↓';
    } else {
      icon.textContent = '⇅';
    }
  });
}

/* Clic sur un en-tête : même colonne → inverse le sens ; autre colonne → tri asc */
function sortTable(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  renderTable();
}

/* ══════════════════════════════════════════
   MODIFIER
   La modal utilise <input type="date"> → YYYY-MM-DD requis.
   On convertit depuis dd/MM/yyyy (ce que le .gs renvoie).
   On renvoie ISO au script lors de la sauvegarde.
   ══════════════════════════════════════════ */
function openEdit(ev) {
  document.getElementById('edit-rowIndex').value  = ev.id;
  document.getElementById('edit-date').value      = ev.date_rando      || '';
  document.getElementById('edit-nom').value       = ev.nom_rando       || '';
  document.getElementById('edit-animateur').value = ev.animateur       || '';
  document.getElementById('edit-heureRV').value   = ev.heure_rv        || '';
  document.getElementById('edit-parking').value   = ev.parking_covoit  || '';
  document.getElementById('edit-ibp').value       = ev.ibp             || '';
  document.getElementById('edit-duree').value     = ev.duree           || '';
  document.getElementById('edit-distance').value  = ev.distance        || '';
  document.getElementById('edit-denivele').value  = ev.denivele        || '';
  document.getElementById('edit-statut').value    = ev.statut          || 'publiée';
  document.getElementById('edit-remarques').value = ev.remarques       || '';
  document.getElementById('modal-edit').classList.add('open');
}

async function saveEdit() {
  const id        = document.getElementById('edit-rowIndex').value;
  const date      = document.getElementById('edit-date').value;
  const nom       = document.getElementById('edit-nom').value.trim();
  const animateur = document.getElementById('edit-animateur').value.trim();
  const heureRV   = document.getElementById('edit-heureRV').value.trim();
  const parking   = document.getElementById('edit-parking').value.trim();
  const ibp       = document.getElementById('edit-ibp').value.trim();
  const duree     = document.getElementById('edit-duree').value.trim();
  const distance  = document.getElementById('edit-distance').value.trim();
  const denivele  = document.getElementById('edit-denivele').value.trim();
  const statut    = document.getElementById('edit-statut').value;
  const remarques = document.getElementById('edit-remarques').value.trim();
  if (!date || !nom || !animateur) { showToast('Champs obligatoires manquants.', true); return; }
  setBusy('btn-save-edit', true);
  try {
    const patch = {
      date_rando:     date,
      nom_rando:      nom,
      animateur:      animateur,
      heure_rv:       heureRV   || null,
      parking_covoit: parking   || null,
      ibp:            ibp       ? parseFloat(ibp)      : null,
      duree:          duree     || null,
      distance:       distance  ? parseFloat(distance) : null,
      denivele:       denivele  ? parseInt(denivele)   : null,
      statut:         statut,
      remarques:      remarques || null,
    };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fiches?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer':        'return=minimal'
      },
      body: JSON.stringify(patch)
    });
    if (res.ok) {
      /* Sync Google Calendar */
      const ficheActuelle = allRows.find(x => x.id == id) || {};
      syncCalendar('calendarUpdate', {
        dateRando:     date,
        dateRandoOld:  ficheActuelle.date_rando || date,
        nomRando:      statut === 'annulée' ? `❌ ANNULÉE — ${nom}` : nom,
        animateur:     animateur,
        heureRV:       heureRV   || '',
        parking:       parking   || '',
        parkingDepart: ficheActuelle.parking_depart || '',
        gps:           ficheActuelle.gps            || '',
        distance:      distance  || '',
        denivele:      denivele  || '',
        duree:         duree     || '',
        ibp:           ibp       || '',
        effort:        ficheActuelle.effort     || '',
        technicite:    ficheActuelle.technicite  || '',
        risque:        ficheActuelle.risque      || '',
        couts:         ficheActuelle.couts       || '',
      });
      showToast('✅ Événement modifié dans Supabase et Calendar !');
      closeModal('modal-edit');
      loadEvents();
    } else {
      const txt = await res.text();
      showToast('Erreur : ' + txt, true);
    }
  } catch(e) { showToast('Erreur réseau.', true); }
  setBusy('btn-save-edit', false);
}

/* Sync Calendar via Edge Function (best-effort) */
async function syncCalendar(action, ficheData) {
  try {
    await fetch('https://whlxbfnmyqdflmxosfse.supabase.co/functions/v1/dynamic-handler', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({ action, fiche: ficheData })
    });
  } catch(e) { console.warn('[Calendar sync] Erreur:', e.message); }
}

/* ══════════════════════════════════════════
   SUPPRIMER
   ══════════════════════════════════════════ */
function confirmDelete(id, nom, animateur, dateRando) {
  if (!confirm('Annuler "' + nom + '" ?\nElle restera visible barrée dans le planning.')) return;
  deleteEvent(id, nom, animateur, dateRando);
}

async function deleteEvent(id, nom, animateur, dateRando) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fiches?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer':        'return=minimal'
      },
      body: JSON.stringify({ statut: 'annulée' })
    });
    if (res.ok) {
      /* Sync Calendar — marquer annulée */
      syncCalendar('calendarUpdate', {
        dateRando:    dateRando,
        dateRandoOld: dateRando,
        nomRando:     `❌ ANNULÉE — ${nom}`,
        animateur:    animateur || '',
      });
      showToast('❌ Randonnée annulée.');
      loadEvents();
    } else showToast('Erreur lors de l\'annulation.', true);
  } catch(e) { showToast('Erreur réseau.', true); }
}

/* ══════════════════════════════════════════
   MODAL
   ══════════════════════════════════════════ */
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
});

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
loadData();
</script>
